<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫓 NAAN — Nostr Archive Index</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #f0b232;
      --link: #58a6ff;
      --green: #3fb950;
      --tag-bg: #1f2937;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 600;
    }

    header h1 span.naan { color: var(--accent); }

    header p {
      color: var(--text-muted);
      margin-top: 0.3rem;
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      align-items: center;
      padding: 1rem 2rem;
      flex-wrap: wrap;
    }

    .controls input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 320px;
      max-width: 100%;
    }

    .controls input::placeholder { color: var(--text-muted); }

    .controls button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .controls button:hover { opacity: 0.85; }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }

    .stats {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0 2rem 0.75rem;
    }

    .stats span { color: var(--green); font-weight: 600; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    .archive-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .archive-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      transition: border-color 0.15s;
    }

    .archive-card:hover { border-color: var(--accent); }

    .archive-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      word-break: break-word;
    }

    .archive-title a { color: var(--text); text-decoration: none; }
    .archive-title a:hover { color: var(--accent); }

    .archive-url {
      color: var(--link);
      font-size: 0.85rem;
      word-break: break-all;
      text-decoration: none;
    }

    .archive-url:hover { text-decoration: underline; }

    .archive-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
    }

    .tag {
      background: var(--tag-bg);
      color: var(--text-muted);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.78rem;
    }

    .tag.format { color: var(--accent); }
    .tag.tool { color: var(--green); }

    .archive-links {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .archive-links a {
      color: var(--link);
      font-size: 0.82rem;
      text-decoration: none;
    }

    .archive-links a:hover { text-decoration: underline; }

    .archive-pubkey {
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: monospace;
      margin-top: 0.35rem;
    }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 4rem 1rem;
      font-size: 1.1rem;
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 1rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--link); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>🫓 <span class="naan">NAAN</span></h1>
    <p>Nostr Archive Index — kind 4554 events from the decentralized web archive</p>
  </header>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Filter by URL or title..." />
    <button id="refreshBtn" onclick="fetchArchives()">Refresh</button>
  </div>

  <div class="stats" id="stats"></div>

  <main>
    <div id="archiveList" class="archive-list">
      <div class="loading"><span class="spinner"></span> Querying relays...</div>
    </div>
  </main>

  <footer>
    <p>Powered by Nostr + <a href="https://github.com/hzrd149/blossom">Blossom</a> · <a href="https://github.com/dergigi/naan">NAAN on GitHub</a></p>
  </footer>

  <script>
    // Seed relays — used for initial queries and to discover more via NIP-66
    const SEED_RELAYS = [
      'wss://relay.damus.io',
      'wss://relay.primal.net',
      'wss://nos.lol'
    ];

    let allRelays = new Set(SEED_RELAYS);
    let queriedRelays = new Set();
    let allEvents = new Map(); // dedup by event id
    let activeConnections = 0;
    let discoveryDone = false;

    function getTag(event, name) {
      const tag = event.tags.find(t => t[0] === name);
      return tag ? tag[1] : null;
    }

    function getAllTags(event, name) {
      return event.tags.filter(t => t[0] === name).map(t => t[1]);
    }

    function formatBytes(bytes) {
      if (!bytes) return null;
      const n = parseInt(bytes);
      if (isNaN(n)) return bytes;
      if (n < 1024) return n + ' B';
      if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
      if (n < 1073741824) return (n / 1048576).toFixed(1) + ' MB';
      return (n / 1073741824).toFixed(2) + ' GB';
    }

    function formatDate(timestamp) {
      return new Date(timestamp * 1000).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function npubFromHex(hex) {
      return hex.substring(0, 12) + '…';
    }

    function updateStats() {
      const events = Array.from(allEvents.values());
      const discovered = allRelays.size - SEED_RELAYS.length;
      const relayInfo = discovered > 0
        ? `${queriedRelays.size} relays queried (${SEED_RELAYS.length} seed + ${discovered} discovered via NIP-66)`
        : `${queriedRelays.size} relays queried`;
      document.getElementById('stats').innerHTML =
        `<span>${events.length}</span> archive${events.length !== 1 ? 's' : ''} found · ${relayInfo}`;
    }

    function renderArchives(filter = '') {
      const list = document.getElementById('archiveList');
      const filterLower = filter.toLowerCase();

      let events = Array.from(allEvents.values())
        .sort((a, b) => b.created_at - a.created_at);

      if (filterLower) {
        events = events.filter(e => {
          const title = (getTag(e, 'title') || '').toLowerCase();
          const url = (getTag(e, 'r') || '').toLowerCase();
          const pages = getAllTags(e, 'page').join(' ').toLowerCase();
          return title.includes(filterLower) || url.includes(filterLower) || pages.includes(filterLower);
        });
      }

      updateStats();

      if (events.length === 0 && activeConnections === 0) {
        list.innerHTML = '<div class="empty">No archives found</div>';
        return;
      }

      if (events.length === 0) return; // still loading

      list.innerHTML = events.map(event => {
        const title = getTag(event, 'title');
        const originalUrl = getTag(event, 'r') || getAllTags(event, 'page')[0] || '';
        const blossomUrls = getAllTags(event, 'url');
        const format = getTag(event, 'format');
        const size = getTag(event, 'size');
        const mime = getTag(event, 'm');
        const tool = getTag(event, 'tool');
        const hash = getTag(event, 'x');
        const archivedAt = getTag(event, 'archived-at');
        const displayDate = archivedAt ? formatDate(parseInt(archivedAt)) : formatDate(event.created_at);

        return `
          <div class="archive-card">
            <div class="archive-title">
              ${blossomUrls.length > 0
                ? `<a href="${blossomUrls[0]}" target="_blank">${title || originalUrl || 'Untitled Archive'}</a>`
                : (title || originalUrl || 'Untitled Archive')
              }
            </div>
            ${originalUrl ? `<a class="archive-url" href="${originalUrl}" target="_blank">${originalUrl}</a>` : ''}
            <div class="archive-meta">
              <span class="tag">${displayDate}</span>
              ${format ? `<span class="tag format">${format.toUpperCase()}</span>` : ''}
              ${mime ? `<span class="tag">${mime}</span>` : ''}
              ${size ? `<span class="tag">${formatBytes(size)}</span>` : ''}
              ${tool ? `<span class="tag tool">${tool}</span>` : ''}
              ${hash ? `<span class="tag" title="${hash}">sha256:${hash.substring(0, 12)}…</span>` : ''}
            </div>
            ${blossomUrls.length > 0 ? `
              <div class="archive-links">
                ${blossomUrls.map((u, i) => `<a href="${u}" target="_blank">📦 ${i === 0 ? 'Blossom' : 'Mirror ' + i}</a>`).join('')}
              </div>
            ` : ''}
            <div class="archive-pubkey">by ${npubFromHex(event.pubkey)}</div>
          </div>
        `;
      }).join('');
    }

    // Query a single relay for kind 4554 archive events
    function queryRelayForArchives(relayUrl) {
      if (queriedRelays.has(relayUrl)) return;
      queriedRelays.add(relayUrl);
      activeConnections++;

      try {
        const ws = new WebSocket(relayUrl);
        const subId = 'naan_' + Math.random().toString(36).substring(2, 10);
        let timeout;

        ws.onopen = () => {
          ws.send(JSON.stringify(['REQ', subId, { kinds: [4554], limit: 200 }]));
          timeout = setTimeout(() => ws.close(), 15000);
        };

        ws.onmessage = (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data[0] === 'EVENT' && data[2]) {
              allEvents.set(data[2].id, data[2]);
              renderArchives(document.getElementById('searchInput').value);
            } else if (data[0] === 'EOSE') {
              ws.send(JSON.stringify(['CLOSE', subId]));
              ws.close();
            }
          } catch (e) {}
        };

        ws.onclose = () => {
          clearTimeout(timeout);
          activeConnections--;
          if (activeConnections <= 0) {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = false;
            btn.textContent = 'Refresh';
            renderArchives(document.getElementById('searchInput').value);
          }
        };

        ws.onerror = () => ws.close();
      } catch (e) {
        activeConnections--;
      }
    }

    // NIP-66: Discover relays via kind 30166 events, then query them for archives
    function discoverRelays(seedRelay) {
      try {
        const ws = new WebSocket(seedRelay);
        const subId = 'nip66_' + Math.random().toString(36).substring(2, 10);
        let timeout;

        ws.onopen = () => {
          // Query for recent relay discovery events (last 7 days)
          const since = Math.floor(Date.now() / 1000) - 7 * 86400;
          ws.send(JSON.stringify(['REQ', subId, { kinds: [30166], limit: 500, since }]));
          timeout = setTimeout(() => ws.close(), 10000);
        };

        ws.onmessage = (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data[0] === 'EVENT' && data[2]) {
              const event = data[2];
              // The d-tag contains the relay URL
              const relayUrl = getTag(event, 'd');
              if (relayUrl && relayUrl.startsWith('wss://')) {
                // Only add clearnet relays that don't require payment or auth
                const requiresPayment = event.tags.some(t => t[0] === 'R' && t[1] === 'payment');
                const requiresAuth = event.tags.some(t => t[0] === 'R' && t[1] === 'auth');
                if (!requiresPayment && !requiresAuth) {
                  allRelays.add(relayUrl);
                }
              }
            } else if (data[0] === 'EOSE') {
              ws.send(JSON.stringify(['CLOSE', subId]));
              ws.close();
            }
          } catch (e) {}
        };

        ws.onclose = () => {
          clearTimeout(timeout);
          discoveryDone = true;
          // Now query all discovered relays for archives
          const newRelays = Array.from(allRelays).filter(r => !queriedRelays.has(r));
          // Cap at 30 discovered relays to avoid hammering
          const toQuery = newRelays.slice(0, 30);
          toQuery.forEach(r => queryRelayForArchives(r));
          updateStats();
        };

        ws.onerror = () => ws.close();
      } catch (e) {}
    }

    function fetchArchives() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = 'Discovering relays...';
      allEvents.clear();
      allRelays = new Set(SEED_RELAYS);
      queriedRelays.clear();
      activeConnections = 0;
      discoveryDone = false;

      const list = document.getElementById('archiveList');
      list.innerHTML = '<div class="loading"><span class="spinner"></span> Discovering relays via NIP-66...</div>';

      // Step 1: Query seed relays for archives immediately
      SEED_RELAYS.forEach(r => queryRelayForArchives(r));

      // Step 2: Discover more relays via NIP-66 kind 30166 from seed relays
      SEED_RELAYS.forEach(r => discoverRelays(r));

      // Update button text after discovery phase
      setTimeout(() => {
        if (btn.disabled) btn.textContent = 'Loading...';
      }, 5000);
    }

    // Filter on input
    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderArchives(e.target.value);
    });

    // Load on page load
    fetchArchives();
  </script>
</body>
</html>
