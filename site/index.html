<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫓 NAAN — Nostr Archive Index</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header>
    <h1>🫓 <span class="naan">NAAN</span></h1>
    <p>Nostr Archive Index — kind 4554 events from the decentralized web archive</p>
  </header>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Filter by URL or title..." />

  <div class="stats" id="stats"></div>

  <main>
    <div id="archiveList" class="archive-list">
      <div class="loading"><span class="spinner"></span> Discovering relays via NIP-66...</div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://applesauce.build">Applesauce</a> + <a href="https://github.com/hzrd149/blossom">Blossom</a> + Nostr · <a href="https://github.com/dergigi/naan">GitHub</a> · <a href="https://nsyte.run">nsyte</a></p>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
